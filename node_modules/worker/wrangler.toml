name = "dermatology-clinic-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# D1 Database
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "clinic-db"
database_id = "32eb3255-d8d1-45b0-8796-4345a539438c"

# ============================================================
# R2 Bucket (stub for Phase 1 - images in later phases)
# ============================================================
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "clinic-images"

# ============================================================
# Cloudflare Workflows (Durable Execution)
# ============================================================
[[workflows]]
binding = "REMINDER_WORKFLOW"
name = "reminder-workflow"
class_name = "ReminderWorkflow"

[[workflows]]
binding = "POST_VISIT_WORKFLOW"
name = "post-visit-workflow"
class_name = "PostVisitWorkflow"

# ============================================================
# Environment Variables
# ============================================================
[vars]
JWT_SECRET = "change-this-in-production-use-a-strong-random-secret"
CLINIC_NAME = "Dr. Keshav's Skin, Hair, Cosmetic & Laser Clinic"
CLINIC_ADDRESS = "Above Delight Fast Food, near Mathikere Bus Stop, Mathikere, Bengaluru"
CLINIC_PHONE = "+91 98800 32191"
CLINIC_EMAIL = "contact@drkeshavsclinic.com"
BASE_URL = "https://dermatology-clinic-api.thejaswinps.workers.dev"

# WhatsApp Provider Configuration
WHATSAPP_PROVIDER = "twilio"
TWILIO_ACCOUNT_SID = "your-twilio-account-sid"
TWILIO_AUTH_TOKEN = "your-twilio-auth-token"
TWILIO_WHATSAPP_FROM = "+14155238886"

# Email Provider Configuration
EMAIL_PROVIDER = "gmail"
RESEND_API_KEY = "your-resend-api-key"
RESEND_FROM_EMAIL = "noreply@skincareclinic.com"

# ============================================================
# Scheduled Triggers — fire workflows on a CRON schedule
# ============================================================
[triggers]
crons = ["0 8 * * *", "0 */2 * * *"]
# - 8 AM daily  → send day-before reminders + post-visit feedback requests
# - Every 2 hrs → send hour-before appointment reminders

# ============================================================
# Cloudflare Pages integration
# ============================================================
